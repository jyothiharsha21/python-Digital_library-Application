---
version: "3"
services:
  db:
    container_name: db
    build: ./database
    ports:
      - "3306:3306"
    volumes:
      - db_volume:/var/lib/mysql
    networks:
      - dbnet
      - backendnet

  auth:
    container_name: auth_service
    build: ./auth
    ports:
      - "5001:5001"
    networks:
      - backendnet
      - dbnet
  books:
    container_name: book_service
    build: ./book
    ports:
      - "5002:5002"
    networks:
      - backendnet
      - dbnet

  borrow:
    container_name: borrow_service
    build: ./borrow
    ports:
      - "5003:5003"
    networks:
      - backendnet
      - dbnet

  appservice:
    container_name: frontend
    build: .
    ports:
      - "5000:5000"
    networks:
      - frontendnet
      - backendnet

volumes:
  db_volume:

networks:
  dbnet:
    driver: bridge
  backendnet:
    driver: bridge
  frontendnet:
    driver: bridge
